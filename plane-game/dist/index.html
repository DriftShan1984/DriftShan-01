<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飞机大战</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-info">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="lives">生命: <span id="lives">10</span></div>
            <div class="challenge-info" id="challengeInfo" style="display: none;">
                <span>时间: <span id="timer">0</span>s</span>
                <span>伤害: <span id="damage">0</span></span>
            </div>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="start-screen" id="startScreen">
            <h1>飞机大战</h1>
            <p>PC: 方向键/WASD/鼠标 | 手机: 触控移动</p>
            <button id="startBtn">开始游戏</button>
            <button id="challengeBtn" style="margin-top: 10px;">挑战</button>
        </div>
        <div class="game-over-screen" id="gameOverScreen">
            <h1>游戏结束</h1>
            <p>最终得分: <span id="finalScore">0</span></p>
            <p id="challengeStats" style="display: none;">存活时间: <span id="finalTime">0</span>s | 造成伤害: <span id="finalDamage">0</span></p>
            <button id="restartBtn">重新开始</button>
            <button id="returnBtn" style="margin-top: 10px; display: none;">返回主页</button>
        </div>
    </div>
    <script src="js/game.js"></script>
</body>
</html>
